<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Video Offline — Library</title>
  <link rel="stylesheet" href="library.css">
  <link rel="stylesheet" href="../lib/custom-player.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Video Offline</h1>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn active" data-view="all" data-i18n="allVideos">All Videos</button>
        <button class="nav-btn" data-view="youtube">YouTube</button>
        <button class="nav-btn" data-view="netflix">Netflix</button>
      </nav>

      <div class="playlist-section">
        <div class="playlist-header">
          <h2 data-i18n="playlists">Playlists</h2>
          <button id="createPlaylistBtn" class="add-btn">+</button>
        </div>
        <div id="playlistList" class="playlist-list"></div>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <h2 id="viewTitle" data-i18n="allVideos">All Videos</h2>
        <span id="videoCount" class="video-count"></span>
        <button id="reloadVideos" class="reload-btn" data-i18n-title="loadingDots" title="Reload">↻</button>
      </header>

      <div id="videoGrid" class="video-grid"></div>

      <!-- Inline player panel -->
      <div id="playerPanel" class="player-panel hidden">
        <div class="player-wrapper" id="playerWrapper">
          <video id="videoPlayer"></video>

          <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <p data-i18n="loadingDots">Loading...</p>
          </div>

          <div id="resumeToast" class="resume-toast hidden">
            <span id="resumeText"></span>
            <button id="resumeFromStart" data-i18n="fromBeginning">From beginning</button>
          </div>
        </div>

        <div class="player-info">
          <h1 id="videoTitle"></h1>
          <div class="player-meta">
            <span id="videoSource"></span>
            <span id="videoAuthor"></span>
            <span id="videoQuality"></span>
            <span id="videoSize"></span>
          </div>
          <div class="player-controls-bar">
            <div id="playlistControls" class="playlist-controls hidden">
              <button id="prevBtn" class="nav-btn-player" data-i18n="previous">← Previous</button>
              <span id="playlistPosition"></span>
              <button id="nextBtn" class="nav-btn-player" data-i18n="next">Next →</button>
            </div>
            <label class="autoplay-toggle">
              <input type="checkbox" id="autoplayCheckbox" checked>
              <span data-i18n="autoplay">Autoplay</span>
            </label>
          </div>
        </div>

        <div id="upNextList" class="up-next-list hidden">
          <h2 data-i18n="upNext">Up Next</h2>
          <div id="upNextItems"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Playlist creation modal -->
  <div id="playlistModal" class="modal hidden">
    <div class="modal-content">
      <h3 data-i18n="newPlaylist">New Playlist</h3>
      <input type="text" id="playlistNameInput" data-i18n-placeholder="playlistNamePlaceholder" placeholder="Playlist name" />
      <div class="modal-actions">
        <button id="cancelPlaylist" class="btn-secondary" data-i18n="cancel">Cancel</button>
        <button id="confirmPlaylist" class="btn-primary" data-i18n="create">Create</button>
      </div>
    </div>
  </div>

  <!-- Add to playlist modal -->
  <div id="addToPlaylistModal" class="modal hidden">
    <div class="modal-content">
      <h3 data-i18n="addToPlaylist">Add to Playlist</h3>
      <div id="playlistOptions" class="playlist-options"></div>
      <div class="modal-actions">
        <button id="closeAddToPlaylist" class="btn-secondary" data-i18n="close">Close</button>
      </div>
    </div>
  </div>

  <script src="../lib/i18n.js"></script>
  <script src="../lib/custom-player.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="library.js"></script>
</body>
</html>
