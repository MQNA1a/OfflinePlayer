<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Video Offline — Player</title>
  <link rel="stylesheet" href="player.css">
</head>
<body>
  <div class="player-app">
    <div class="player-main">
      <div class="player-wrapper" id="playerWrapper">
        <video id="videoPlayer" controls></video>

        <div id="skipBack" class="skip-btn skip-back" data-i18n-title="previous" title="10s back">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H4c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"/><text x="12" y="16" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor">10</text></svg>
        </div>
        <div id="skipFwd" class="skip-btn skip-fwd" data-i18n-title="next" title="10s forward">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1l5 5-5 5V7c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6h2c0 4.4-3.6 8-8 8s-8-3.6-8-8 3.6-8 8-8z"/><text x="12" y="16" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor">10</text></svg>
        </div>

        <div id="loadingOverlay" class="loading-overlay">
          <div class="spinner"></div>
          <p data-i18n="loadingDots">Loading...</p>
        </div>

        <div id="resumeToast" class="resume-toast hidden">
          <span id="resumeText"></span>
          <button id="resumeFromStart" data-i18n="fromBeginning">From beginning</button>
        </div>
      </div>

      <div class="player-info">
        <h1 id="videoTitle"></h1>
        <div class="player-meta">
          <span id="videoSource"></span>
          <span id="videoAuthor"></span>
          <span id="videoQuality"></span>
          <span id="videoSize"></span>
        </div>

        <div id="playlistControls" class="playlist-controls hidden">
          <button id="prevBtn" class="nav-btn-player" data-i18n="previous">← Previous</button>
          <span id="playlistPosition"></span>
          <button id="nextBtn" class="nav-btn-player" data-i18n="next">Next →</button>
        </div>
      </div>
    </div>

    <aside id="playlistSidebar" class="playlist-sidebar hidden">
      <h3 data-i18n="playlists">Playlists</h3>
      <div id="sidebarVideos" class="sidebar-videos"></div>
    </aside>
  </div>

  <script src="../lib/i18n.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="player.js"></script>
</body>
</html>
